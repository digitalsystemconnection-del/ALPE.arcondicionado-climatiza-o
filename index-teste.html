<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ALPE - Loja</title>
<style>
body { font-family: Arial, sans-serif; margin: 0; padding: 20px; background: #f5f5f5; }
.container { max-width: 1200px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; }
h1 { color: #0066cc; }
.produtos { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; }
.produto { border: 1px solid #ddd; border-radius: 8px; padding: 15px; text-align: center; background: white; }
.produto img { max-width: 100%; height: 150px; object-fit: contain; }
.produto h3 { font-size: 16px; margin: 10px 0; }
.produto .preco { font-size: 22px; color: #0066cc; font-weight: bold; }
.produto button { background: #0066cc; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-size: 16px; width: 100%; }
.produto button:hover { background: #0055aa; }
.carrinho { position: fixed; top: 20px; right: 20px; background: white; padding: 15px 25px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); z-index: 999; cursor: pointer; display: flex; align-items: center; gap: 10px; }
.carrinho .badge { background: #d30029; color: white; border-radius: 50%; padding: 2px 10px; font-size: 14px; }
.checkout { margin-top: 30px; padding: 20px; background: #f8f9fa; border-radius: 10px; display: none; }
.checkout.ativo { display: block; }
.btn-finalizar { background: #22c55e; color: white; border: none; padding: 15px 30px; border-radius: 8px; font-size: 18px; cursor: pointer; width: 100%; margin-top: 10px; }
.btn-finalizar:hover { background: #16a34a; }
.carrinho-lista { list-style: none; padding: 0; }
.carrinho-lista li { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
.remover { color: red; cursor: pointer; margin-left: 10px; }
</style>
</head>
<body>

<div class="carrinho" onclick="toggleCarrinho()">
    🛒 Carrinho <span class="badge" id="badge">0</span>
</div>

<div class="container">
    <h1>🏷️ ALPE - Produtos</h1>
    <div class="produtos" id="produtos"></div>
    
    <div class="checkout" id="checkout">
        <h2>🛒 Seu Carrinho</h2>
        <ul class="carrinho-lista" id="carrinhoLista"></ul>
        <div style="text-align:right;font-size:20px;font-weight:bold;margin:15px 0;">
            Total: R$ <span id="total">0,00</span>
        </div>
        <button class="btn-finalizar" onclick="finalizarPedido()">📦 FINALIZAR PEDIDO</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ============================================
// CONFIGURAÇÃO
// ============================================
const SUPABASE_URL = 'https://imkkxhsxlqwtbdfljwsq.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlta2t4aHN4bHF3dGJkZmxqd3NxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzNTYxNjEsImV4cCI6MjA5NTkzMjE2MX0.7WHQvxf_uW90Gs2wzlmuduukoENII5syowTTFiTvtTs';

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
let produtos = [];
let carrinho = [];

// ============================================
// FUNÇÕES
// ============================================

async function carregarProdutos() {
    const { data, error } = await supabase
        .from('produtos')
        .select('*')
        .eq('ativo', true)
        .eq('destaque', true)
        .limit(12);
    
    if (error) {
        console.error('Erro:', error);
        return;
    }
    
    produtos = data;
    renderizarProdutos();
}

function renderizarProdutos() {
    const container = document.getElementById('produtos');
    container.innerHTML = '';
    
    produtos.forEach(p => {
        const div = document.createElement('div');
        div.className = 'produto';
        div.innerHTML = `
            <img src="${p.imagem_url || 'images/default.jpg'}" alt="${p.nome}" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22200%22 height=%22200%22%3E%3Crect fill=%22%23ddd%22 width=%22200%22 height=%22200%22/%3E%3Ctext x=%2250%22 y=%22110%22 font-family=%22Arial%22 font-size=%2230%22 fill=%22%23999%22%3E📦%3C/text%3E%3C/svg%3E'">
            <h3>${p.nome}</h3>
            <p style="color:#666;font-size:14px;">${p.marca || ''} ${p.btu ? p.btu + ' BTU' : ''}</p>
            <div class="preco">R$ ${p.preco.toFixed(2).replace('.', ',')}</div>
            <button onclick="adicionarAoCarrinho('${p.id}')">🛒 COMPRAR</button>
        `;
        container.appendChild(div);
    });
}

async function adicionarAoCarrinho(produtoId) {
    const produto = produtos.find(p => p.id === produtoId);
    if (!produto) return;
    
    const itemExistente = carrinho.find(item => item.id === produtoId);
    if (itemExistente) {
        itemExistente.quantidade += 1;
    } else {
        carrinho.push({
            id: produto.id,
            nome: produto.nome,
            preco: produto.preco,
            imagem: produto.imagem_url,
            quantidade: 1
        });
    }
    
    atualizarBadge();
    salvarCarrinho();
    alert('✅ ' + produto.nome + ' adicionado ao carrinho!');
}

function removerDoCarrinho(produtoId) {
    carrinho = carrinho.filter(item => item.id !== produtoId);
    atualizarBadge();
    salvarCarrinho();
    renderizarCarrinho();
}

function atualizarBadge() {
    const total = carrinho.reduce((sum, item) => sum + item.quantidade, 0);
    document.getElementById('badge').textContent = total;
}

function salvarCarrinho() {
    localStorage.setItem('carrinho_alpe', JSON.stringify(carrinho));
}

function carregarCarrinho() {
    const saved = localStorage.getItem('carrinho_alpe');
    if (saved) {
        carrinho = JSON.parse(saved);
        atualizarBadge();
    }
}

function toggleCarrinho() {
    const checkout = document.getElementById('checkout');
    checkout.classList.toggle('ativo');
    if (checkout.classList.contains('ativo')) {
        renderizarCarrinho();
    }
}

function renderizarCarrinho() {
    const lista = document.getElementById('carrinhoLista');
    const totalSpan = document.getElementById('total');
    
    if (carrinho.length === 0) {
        lista.innerHTML = '<li style="text-align:center;color:#999;padding:30px 0;">🛒 Carrinho vazio</li>';
        totalSpan.textContent = '0,00';
        return;
    }
    
    lista.innerHTML = '';
    let total = 0;
    
    carrinho.forEach(item => {
        const li = document.createElement('li');
        const subtotal = item.preco * item.quantidade;
        total += subtotal;
        
        li.innerHTML = `
            <span>${item.nome} x${item.quantidade}</span>
            <span>R$ ${subtotal.toFixed(2).replace('.', ',')} 
                <span class="remover" onclick="removerDoCarrinho('${item.id}')">✕</span>
            </span>
        `;
        lista.appendChild(li);
    });
    
    totalSpan.textContent = total.toFixed(2).replace('.', ',');
}

async function finalizarPedido() {
    if (carrinho.length === 0) {
        alert('🛒 Carrinho vazio!');
        return;
    }
    
    const nome = prompt('📝 Seu nome completo:');
    if (!nome) return;
    
    const telefone = prompt('📱 Seu telefone:');
    if (!telefone) return;
    
    const dados = {
        nome: nome,
        telefone: telefone,
        email: prompt('📧 Email:') || '',
        cpf: prompt('📄 CPF:') || '',
        endereco: {
            rua: prompt('🏠 Rua:') || '',
            numero: prompt('🔢 Número:') || '',
            bairro: prompt('🏘️ Bairro:') || '',
            cidade: prompt('🌆 Cidade:') || '',
            estado: prompt('📌 Estado:') || '',
            cep: prompt('📮 CEP:') || ''
        },
        pagamento: 'pendente'
    };
    
    const total = carrinho.reduce((s, i) => s + (i.preco * i.quantidade), 0);
    const numPedido = 'ALPE-' + Date.now().toString().slice(-8) + '-' + Math.random().toString(36).substr(2, 4).toUpperCase();
    
    const { data: pedido, error } = await supabase
        .from('pedidos')
        .insert({
            numero_pedido: numPedido,
            cliente_nome: dados.nome,
            cliente_telefone: dados.telefone,
            cliente_email: dados.email || '',
            cliente_cpf: dados.cpf || '',
            endereco_entrega: dados.endereco || {},
            total_produtos: total,
            total_pedido: total,
            forma_pagamento: 'pendente',
            session_id: 'web_' + Date.now()
        })
        .select()
        .single();
    
    if (error) {
        alert('❌ Erro ao criar pedido: ' + error.message);
        return;
    }
    
    // Salvar itens
    const itens = carrinho.map(item => ({
        pedido_id: pedido.id,
        sku: 'SKU-' + item.id.slice(0, 8),
        nome_produto: item.nome,
        quantidade: item.quantidade,
        preco_unitario: item.preco,
        subtotal: item.preco * item.quantidade
    }));
    
    await supabase.from('itens_pedido').insert(itens);
    
    // Limpar carrinho
    carrinho = [];
    salvarCarrinho();
    atualizarBadge();
    renderizarCarrinho();
    
    alert('✅ PEDIDO #' + numPedido + ' CRIADO COM SUCESSO!');
    document.getElementById('checkout').classList.remove('ativo');
}

// ============================================
// INICIAR
// ============================================
carregarCarrinho();
carregarProdutos();

console.log('✅ Loja ALPE iniciada!');
console.log('📦 Clique em COMPRAR para adicionar produtos.');
</script>
</body>
</html>
